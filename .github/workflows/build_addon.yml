name: build addon

on:
  push:
    tags: ["*"]
    # To build on main/master branch, uncomment the following line:
    # branches: [ main , master ]

  pull_request:
    branches: [ main, master ]

  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v7

    - run: echo -e "pre-commit\nscons\nmarkdown">requirements.txt

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: 3.11
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip wheel
        pip install -r requirements.txt
        sudo apt-get update  -y
        sudo apt-get install -y gettext

    - name: Code checks
      run: export SKIP=no-commit-to-branch; pre-commit run --all

    - name: building addon
      run: scons && scons pot

    - uses: actions/upload-artifact@v7
      with:
        name: packaged_addon
        path: |
          ./*.nvda-addon
          ./*.pot

  upload_release:
    runs-on: ubuntu-latest
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    needs: ["build"]
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v7
    - name: download releases files
      uses: actions/download-artifact@v8
    - name: Display structure of downloaded files
      run: ls -R
    - name: Calculate sha256
      run: |
        echo -e "\nSHA256: " >> changelog.md
        sha256sum *.nvda-addon >> changelog.md

    - name: Release
      uses: softprops/action-gh-release@v3
      with:
        files: |
          *.nvda-addon
          *.pot
        body_path: changelog.md
        fail_on_unmatched_files: true
        prerelease: ${{ contains(github.ref, '-') }}

    - name: Send Telegram Notification
      run: |
        head -n 100 changelog.md > log_part.txt
        sed -i 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g' log_part.txt
        
        sed -i 's/\*\*\([^*]*\)\*\*/<b>\1<\/b>/g' log_part.txt
        sed -i 's/\*\([^*]*\)\*/<i>\1<\/i>/g' log_part.txt
        sed -i 's/^## \(.*\)/<b>🔹 \1<\/b>/g' log_part.txt
        sed -i 's/^\* /• /g' log_part.txt
        
        sed -i 's/\*//g' log_part.txt

        cat << 'EOF' > tg_msg.txt
        <b>🚀 New Release: Vision Assistant Pro</b>

        <b>Version:</b> <code>${{ github.ref_name }}</code>

        <b>What's New:</b>
        EOF
        
        cat log_part.txt >> tg_msg.txt
        
        cat << 'EOF' >> tg_msg.txt

        <a href="${{ github.event.repository.html_url }}/releases/tag/${{ github.ref_name }}">📦 View and Download on GitHub</a>

        #NVDA #AI #VisionAssistant
        EOF

        MSG_LEN=$(wc -m < tg_msg.txt | awk '{print $1}')
        if [ "$MSG_LEN" -gt 4000 ]; then
            awk '/🌟 Support the Future/{flag=1} flag' changelog.md > donate_part.txt
            sed -i 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g' donate_part.txt
            sed -i 's/\[\([^]]*\)\](\([^)]*\))/<a href="\2">\1<\/a>/g' donate_part.txt
            sed -i 's/\*\*\([^*]*\)\*\*/<b>\1<\/b>/g' donate_part.txt
            sed -i 's/\*\([^*]*\)\*/<i>\1<\/i>/g' donate_part.txt
            sed -i 's/^### \(.*\)/<b>🔹 \1<\/b>/g' donate_part.txt
            sed -i 's/^\* /• /g' donate_part.txt
            sed -i 's/`\([^`]*\)`/<code>\1<\/code>/g' donate_part.txt
            sed -i 's/\*//g' donate_part.txt

            cat << 'EOF' > tg_msg.txt
        <b>🚀 New Release: Vision Assistant Pro</b>

        <b>Version:</b> <code>${{ github.ref_name }}</code>

        <i>(The changelog is too long for Telegram. Please view the full changelog on GitHub!)</i>

        EOF
            cat donate_part.txt >> tg_msg.txt
            cat << 'EOF' >> tg_msg.txt

        <a href="${{ github.event.repository.html_url }}/releases/tag/${{ github.ref_name }}">📦 View and Download on GitHub</a>

        #NVDA #AI #VisionAssistant
        EOF
        fi

        curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
          --data-urlencode "chat_id=${{ secrets.TELEGRAM_TO }}" \
          --data-urlencode "text@tg_msg.txt" \
          -d "parse_mode=HTML" \
          -d "disable_web_page_preview=false"